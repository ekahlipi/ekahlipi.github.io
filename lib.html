<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Library — Ekahlipi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "Inter", sans-serif;
  background: #fff;
  color: #3b2a1a;
}

header {
  text-align: center;
  padding: 40px 20px;
  border-bottom: 2px solid #efe1c6;
}

header h1 {
  font-family: "Playfair Display", serif;
  font-size: 3rem;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 40px 20px;
}

.book {
  background: #efe1c6;
  padding: 20px;
  margin: 20px auto;
  border-radius: 14px;
  text-align: center;
  max-width: 500px;
  box-shadow: 0 8px 18px rgba(0,0,0,0.08);
}

.book h2 {
  font-family: "Playfair Display", serif;
}

.download-btn {
  display: inline-block;
  margin-top: 12px;
  padding: 10px 20px;
  background: #3b2a1a;
  color: #fff;
  border-radius: 10px;
  text-decoration: none;
}

.msg {
  text-align: center;
  margin-top: 60px;
  color: #6b4b32;
}
</style>
</head>

<body>

<header>
  <h1>Your Library</h1>
  <p>Only your purchased books appear here</p>
</header>

<div class="container">
  <div id="library"></div>
</div>

<script>
function loadLibrary() {
  const container = document.getElementById("library");

  let email = localStorage.getItem("user_email");

  if (!email) {
    container.innerHTML = "<p class='msg'>Please login to access your library.</p>";
    return;
  }

  let allUsers = JSON.parse(localStorage.getItem("user_books") || "{}");

  let userBooks = allUsers[email] || [];

  if (userBooks.length === 0) {
    container.innerHTML = `<p class='msg'>No books purchased for <b>${email}</b></p>`;
    return;
  }

  container.innerHTML = "";

  userBooks.forEach(book => {
    container.innerHTML += `
      <div class="book">
        <h2>${book.name}</h2>
        <a class="download-btn" href="${book.file}" download>
          Download PDF
        </a>
      </div>
    `;
  });
}

loadLibrary();
</script>

</body>
</html>

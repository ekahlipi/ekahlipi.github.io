<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment Success — Ekahlipi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --coffee-dark: #3E2723;
  --coffee-medium: #6F4E37;
  --coffee-light: #EDE0D4;
  --cream: #FAF7F2;
}

body {
  font-family: "Inter", sans-serif;
  background: var(--cream);
  text-align: center;
  padding: 60px 20px;
  color: var(--coffee-dark);
}

h1 {
  font-family: "Playfair Display", serif;
}

.btn {
  display: inline-block;
  margin-top: 25px;
  padding: 12px 28px;
  background: var(--coffee-medium);
  color: white;
  text-decoration: none;
  border-radius: 30px;
  font-weight: 600;
}
</style>
</head>

<body>

<h1>Payment Successful 🎉</h1>
<p>Your book is ready to download</p>

<script>
function unlockBook() {
  let email = localStorage.getItem("user_email");

  if (!email) {
    alert("User not logged in!");
    return;
  }

  let allUsers = JSON.parse(localStorage.getItem("user_books") || "{}");

  if (!allUsers[email]) {
    allUsers[email] = [];
  }

  let book = {
    name: "Ekahlipi — Scripts of Oneness",
    file: "protected-ekahlipi.pdf"
  };

  // avoid duplicates
  if (!allUsers[email].some(b => b.file === book.file)) {
    allUsers[email].push(book);
  }

  localStorage.setItem("user_books", JSON.stringify(allUsers));
}
</script>

<a class="btn"
   href="protected-ekahlipi.pdf"
   download
   onclick="unlockBook()">
   Download PDF
</a>

<br><br>

<a href="lib.html" style="color:#6F4E37;">
  Go to Library →
</a>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Purchased PDF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

  #timer {
  margin-top: 14px;
  font-size: 0.95rem;
  color: #5c3b28;
  }
:root {
  --coffee-dark: #3E2723;
  --coffee-medium: #6F4E37;
  --coffee-light: #EDE0D4;
  --cream: #FAF7F2;
}

body {
  font-family: "Inter", sans-serif;
  background: var(--cream);
  color: var(--coffee-dark);
  margin: 0;
  padding: 40px 20px;
  text-align: center;
}

h1 {
  font-family: "Playfair Display", serif;
  margin-bottom: 8px;
}

.book-title {
  font-size: 1.1rem;
  color: var(--coffee-medium);
  margin-bottom: 30px;
}

.preview-box {
  background: var(--coffee-light);
  border-radius: 14px;
  padding: 20px;
  max-width: 420px;
  margin: auto;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.preview-box img {
  width: 100%;
  border-radius: 10px;
}

.download-btn {
  display: inline-block;
  margin-top: 25px;
  padding: 12px 28px;
  background: var(--coffee-medium);
  color: #fff;
  text-decoration: none;
  border-radius: 30px;
  font-weight: 600;
  transition: all 0.25s ease;
}

.download-btn:hover {
  background: var(--coffee-dark);
  transform: translateY(-2px);
}

.note {
  font-size: 0.9rem;
  color: #6b4b32;
  margin-top: 18px;
}

.thank-you {
  margin-top: 40px;
  font-size: 0.95rem;
}

.back-link {
  display: inline-block;
  margin-top: 15px;
  color: var(--coffee-medium);
  text-decoration: underline;
  font-size: 0.9rem;
}
</style>
</head>
<script>
document.addEventListener("DOMContentLoaded", function () {

  const SESSION_HOURS = 4; // change to 2, 3, 24 if needed
  const countdownEl = document.getElementById("countdown");
  const downloadBtn = document.querySelector(".download-btn");

  const SESSION_KEY = "ekahlipi_pdf_expiry";

  // Create session expiry if not exists
  if (!localStorage.getItem(SESSION_KEY)) {
    const expiryTime = Date.now() + SESSION_HOURS * 60 * 60 * 1000;
    localStorage.setItem(SESSION_KEY, expiryTime);
  }

  const expiry = parseInt(localStorage.getItem(SESSION_KEY));

  function updateTimer() {
    const now = Date.now();
    let remaining = Math.floor((expiry - now) / 1000);

    if (remaining <= 0) {
      countdownEl.textContent = "Session Expired";
      if (downloadBtn) {
        downloadBtn.style.pointerEvents = "none";
        downloadBtn.style.opacity = "0.5";
        downloadBtn.textContent = "Access Expired";
      }
      clearInterval(timerInterval);
      return;
    }

    const hours = Math.floor(remaining / 3600);
    const minutes = Math.floor((remaining % 3600) / 60);
    const seconds = remaining % 60;

    countdownEl.textContent =
      String(hours).padStart(2, "0") + ":" +
      String(minutes).padStart(2, "0") + ":" +
      String(seconds).padStart(2, "0");
  }

  updateTimer();
  const timerInterval = setInterval(updateTimer, 1000);

});
</script>
<body>

<h1>Your Purchased PDF</h1>
<div class="book-title">Ekahlipi — Scripts of Oneness</div>

<div class="preview-box">
  <!-- 🔽 CHANGE IMAGE PATH HERE -->
  <img src="ercover.png" alt="Book Preview Image">
</div>

<!-- 🔽 CHANGE PDF PATH HERE -->
<a href="protected-ekahlipi.pdf" class="download-btn" target="_blank">
  Download PDF
</a>
<div id="timer" class="note">
  ⏳ Access expires in <strong><span id="countdown">04:00:00</span></strong>
</div>
<div class="note">
  Please download the PDF within <strong>3–4 hours</strong>.  
  Access may be restricted after the session expires.
</div>

<div class="thank-you">
  🤍 Thank you for purchasing and supporting independent writing.
</div>

<!-- 🔽 CHANGE MAIN PAGE LINK HERE -->
<a href="index.html" class="back-link">
  ← Redirect to Main Page
</a>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Purchased PDF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --coffee-dark: #3E2723;
  --coffee-medium: #6F4E37;
  --coffee-light: #EDE0D4;
  --cream: #FAF7F2;
}

body {
  font-family: "Inter", sans-serif;
  background: var(--cream);
  color: var(--coffee-dark);
  margin: 0;
  padding: 40px 20px;
  text-align: center;
}

h1 {
  font-family: "Playfair Display", serif;
}

.book-title {
  font-size: 1.1rem;
  color: var(--coffee-medium);
  margin-bottom: 30px;
}

.preview-box {
  background: var(--coffee-light);
  border-radius: 14px;
  padding: 20px;
  max-width: 420px;
  margin: auto;
}

.preview-box img {
  width: 100%;
  border-radius: 10px;
}

.download-btn {
  display: inline-block;
  margin-top: 25px;
  padding: 12px 28px;
  background: var(--coffee-medium);
  color: #fff;
  text-decoration: none;
  border-radius: 30px;
  font-weight: 600;
}

.note {
  font-size: 0.9rem;
  color: #6b4b32;
  margin-top: 18px;
}
</style>
</head>

<body>

<script>
/* =========================
   AUTO UNLOCK + LIBRARY ADD
   ========================= */

function unlockBook() {
  let library = JSON.parse(localStorage.getItem("my_books")) || [];

  let book = {
    name: "Ekahlipi — Scripts of Oneness",
    file: "protected-ekahlipi.pdf"
  };

  // avoid duplicates
  if (!library.some(b => b.file === book.file)) {
    library.push(book);
    localStorage.setItem("my_books", JSON.stringify(library));
  }
}

// run immediately when page opens
unlockBook();
</script>

<h1>Your Purchased PDF</h1>

<div class="book-title">
  Ekahlipi — Scripts of Oneness
</div>

<div class="preview-box">
  <img src="ercover.png" alt="Book Preview Image">
</div>

<!-- IMPORTANT: DOWNLOAD ALSO TRIGGERS LIBRARY LOGIC -->
<a href="protected-ekahlipi.pdf"
   class="download-btn"
   download
   onclick="unlockBook()">
  Download PDF
</a>

<div class="note">
  Your book has been saved in your Library 📚
</div>

<br><br>

<a href="lib.html" style="color:#6F4E37;">
  → Go to Library
</a>

</body>
</html>

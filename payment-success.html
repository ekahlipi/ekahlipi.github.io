<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment Successful</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
  <h2>Payment Successful ✅</h2>
  <p>Preparing your PDF...</p>

  <script>
// Check login
const loggedIn = localStorage.getItem("ekahlipi_logged_in");

if (!loggedIn) {
  alert("Please login first.");
  window.location.href = "login.html";
}

// Save book to library
let purchasedBooks = JSON.parse(localStorage.getItem("my_books")) || [];

purchasedBooks.push({
  id: "ekahlipi",
  name: "Ekahlipi — Scripts of Oneness",
  file: "pdf-ekahlipi.pdf"
});

localStorage.setItem("my_books", JSON.stringify(purchasedBooks));

// Redirect to homepage (NOT PDF page anymore)
setTimeout(() => {
  window.location.href = "index.html";
}, 1500);
  </script>
</body>
</html>
